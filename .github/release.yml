changelog:
  exclude-contributors:
    - dependabot
    - github-actions
  categories:
    - title: Changes
      labels:
        - '*'
      exclude:
        labels:
          - dependencies
          - MCP Toolnames
    - title: 📦 npm Dependencies
      labels:
        - npm
    - title: 📦 GitHub Actions Dependencies
      labels:
        - github-actions
    - title: 📦 Other Dependencies
      labels:
        - dependencies
    - title: Toolnames
      labels: 
        - MCP Toolnames
